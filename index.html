<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Scribble by Kunal Singh – Superhero Edition</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800&display=swap');

  :root {
    --hero-gold: #FFD700;
    --hero-red: #E63946;
    --hero-blue: #1D3557;
    --hero-cyan: #00B4D8;
    --hero-purple: #7B2FBE;
    --hero-green: #06D6A0;
    --bg: #0A0A1A;
    --panel: #12122A;
    --panel2: #1A1A35;
    --border: rgba(255,215,0,0.25);
    --text: #F1F1F1;
    --muted: #9999BB;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 35%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 50%, rgba(255,215,0,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 90% 15%, rgba(0,180,216,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 16px;
  }

  /* HEADER */
  header {
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Bangers', cursive;
    font-size: 2.4rem;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--hero-gold), var(--hero-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .logo span { color: var(--hero-red); -webkit-text-fill-color: var(--hero-red); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .round-badge {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 700;
    color: var(--hero-gold);
  }

  .timer-badge {
    background: var(--panel2);
    border: 1px solid rgba(230,57,70,0.4);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 15px;
    font-weight: 800;
    color: var(--hero-red);
    min-width: 70px;
    text-align: center;
    transition: background 0.3s;
  }

  .timer-badge.urgent {
    background: rgba(230,57,70,0.2);
    animation: pulse 0.8s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* MAIN LAYOUT */
  .game-layout {
    display: grid;
    grid-template-columns: 220px 1fr 260px;
    gap: 14px;
    padding: 14px 0;
    min-height: calc(100vh - 80px);
  }

  @media (max-width: 900px) {
    .game-layout { grid-template-columns: 1fr; }
    .sidebar-left, .sidebar-right { display: none; }
  }

  /* PANELS */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .panel-header {
    padding: 10px 16px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    font-family: 'Bangers', cursive;
    font-size: 1.1rem;
    letter-spacing: 1px;
    color: var(--hero-gold);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* PLAYERS */
  .players-list { padding: 8px; }

  .player-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 10px;
    margin-bottom: 6px;
    border: 1px solid transparent;
    transition: all 0.2s;
  }

  .player-card.active {
    background: rgba(255,215,0,0.08);
    border-color: rgba(255,215,0,0.3);
  }

  .player-card.drawing {
    background: rgba(0,180,216,0.1);
    border-color: rgba(0,180,216,0.4);
    animation: glow-card 1.5s infinite;
  }

  @keyframes glow-card {
    0%,100% { box-shadow: 0 0 0 rgba(0,180,216,0); }
    50% { box-shadow: 0 0 12px rgba(0,180,216,0.4); }
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    border: 2px solid transparent;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-score {
    font-size: 12px;
    color: var(--hero-gold);
    font-weight: 800;
  }

  .pencil-icon { font-size: 16px; }

  /* CANVAS AREA */
  .canvas-area { display: flex; flex-direction: column; gap: 10px; }

  .word-hint-bar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .word-hint {
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    letter-spacing: 8px;
    color: var(--hero-cyan);
  }

  .hint-label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .category-badge {
    background: rgba(123,47,190,0.25);
    border: 1px solid rgba(123,47,190,0.5);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 700;
    color: #C77DFF;
  }

  .canvas-wrapper {
    position: relative;
    background: #FFFFFF;
    border-radius: 16px;
    border: 2px solid rgba(255,215,0,0.4);
    overflow: hidden;
    cursor: crosshair;
  }

  canvas#drawCanvas {
    display: block;
    width: 100%;
    touch-action: none;
  }

  .canvas-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,10,26,0.85);
    border-radius: 14px;
    font-family: 'Bangers', cursive;
    font-size: 2rem;
    color: var(--hero-gold);
    letter-spacing: 2px;
    text-align: center;
    padding: 20px;
  }

  .canvas-overlay.hidden { display: none; }

  /* TOOLBAR */
  .toolbar {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .colors-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .color-btn {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .color-btn:hover { transform: scale(1.2); }
  .color-btn.selected { border-color: white; transform: scale(1.15); }

  .sep { width: 1px; background: var(--border); height: 28px; }

  .size-row { display: flex; gap: 6px; align-items: center; }

  .size-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .size-btn:hover, .size-btn.selected {
    background: rgba(255,215,0,0.15);
    border-color: var(--hero-gold);
  }

  .tool-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--text);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .tool-btn:hover { background: rgba(255,215,0,0.1); border-color: var(--hero-gold); color: var(--hero-gold); }
  .tool-btn.eraser.active { background: rgba(230,57,70,0.15); border-color: var(--hero-red); color: var(--hero-red); }

  .tool-btn.clear { color: var(--hero-red); border-color: rgba(230,57,70,0.3); }
  .tool-btn.clear:hover { background: rgba(230,57,70,0.15); border-color: var(--hero-red); }

  /* RIGHT SIDEBAR */
  .sidebar-right { display: flex; flex-direction: column; gap: 12px; }

  /* CHAT */
  .chat-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 200px;
    max-height: 280px;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .msg {
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .msg-avatar {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }

  .msg-body { flex: 1; }
  .msg-name { font-size: 11px; font-weight: 700; margin-bottom: 2px; }
  .msg-text { font-size: 13px; line-height: 1.4; word-break: break-word; }

  .msg.correct-guess .msg-text {
    color: var(--hero-green);
    font-weight: 700;
  }

  .msg.system .msg-text {
    color: var(--hero-gold);
    font-style: italic;
    font-size: 12px;
  }

  .chat-input-row {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .chat-input {
    flex: 1;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .chat-input:focus { border-color: var(--hero-cyan); }
  .chat-input::placeholder { color: var(--muted); }

  .send-btn {
    width: 34px;
    height: 34px;
    background: var(--hero-cyan);
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--bg);
    font-size: 16px;
    transition: transform 0.15s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.1); }

  /* VOICE CHAT */
  .voice-panel .panel-header { justify-content: space-between; }

  .voice-members {
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .voice-member {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 8px;
    border-radius: 8px;
    transition: background 0.2s;
  }

  .voice-member:hover { background: var(--panel2); }

  .voice-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    position: relative;
    border: 2px solid transparent;
    transition: border-color 0.2s;
  }

  .voice-avatar.speaking {
    border-color: var(--hero-green);
    animation: speak-pulse 0.8s infinite;
  }

  @keyframes speak-pulse {
    0%,100% { box-shadow: 0 0 0 rgba(6,214,160,0); }
    50% { box-shadow: 0 0 10px rgba(6,214,160,0.5); }
  }

  .voice-name { flex: 1; font-size: 13px; font-weight: 600; }

  .voice-icons { display: flex; gap: 4px; align-items: center; }

  .mic-icon {
    font-size: 15px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: all 0.15s;
    color: var(--hero-green);
  }

  .mic-icon.muted { color: var(--hero-red); }
  .mic-icon:hover { background: var(--panel2); }

  /* VOICE CONTROLS */
  .voice-controls {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }

  .vc-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--panel2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    transition: all 0.15s;
    color: var(--text);
  }

  .vc-btn:hover { transform: scale(1.08); }

  .vc-btn.mic-on { background: rgba(6,214,160,0.2); border-color: var(--hero-green); color: var(--hero-green); }
  .vc-btn.mic-off { background: rgba(230,57,70,0.2); border-color: var(--hero-red); color: var(--hero-red); }

  .vc-btn.deafen-off { background: rgba(230,57,70,0.2); border-color: var(--hero-red); color: var(--hero-red); }

  .vc-status {
    font-size: 11px;
    text-align: center;
    color: var(--muted);
    padding: 0 10px 8px;
  }

  .vc-status.connected { color: var(--hero-green); }

  /* Volume bars */
  .vol-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 14px;
  }

  .vol-bar {
    width: 3px;
    background: var(--hero-green);
    border-radius: 1px;
    transition: height 0.1s;
  }

  /* WORD SELECTION */
  .word-select-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,26,0.92);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
  }

  .word-select-overlay.hidden { display: none; }

  .word-select-title {
    font-family: 'Bangers', cursive;
    font-size: 2.5rem;
    color: var(--hero-gold);
    text-align: center;
    letter-spacing: 2px;
  }

  .word-select-title small {
    display: block;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0;
    margin-top: 4px;
  }

  .word-choices {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .word-choice {
    background: var(--panel);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 28px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    min-width: 160px;
  }

  .word-choice:hover {
    border-color: var(--hero-gold);
    background: rgba(255,215,0,0.08);
    transform: translateY(-3px);
  }

  .word-choice-word {
    font-family: 'Bangers', cursive;
    font-size: 1.6rem;
    color: var(--hero-cyan);
    letter-spacing: 1px;
  }

  .word-choice-hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SCORE FLASH */
  .score-flash {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    font-family: 'Bangers', cursive;
    font-size: 4rem;
    color: var(--hero-gold);
    letter-spacing: 4px;
    pointer-events: none;
    z-index: 200;
    animation: flash-anim 1.5s forwards;
    text-align: center;
  }

  @keyframes flash-anim {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
    70% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-70%) scale(0.8); }
  }

  /* RESULTS OVERLAY */
  .results-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,26,0.95);
    z-index: 150;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }

  .results-overlay.hidden { display: none; }

  .results-title {
    font-family: 'Bangers', cursive;
    font-size: 3rem;
    color: var(--hero-gold);
    letter-spacing: 3px;
  }

  .results-list {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    min-width: 300px;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
  }

  .result-rank {
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    width: 30px;
    text-align: center;
  }

  .result-rank.gold { color: var(--hero-gold); }
  .result-rank.silver { color: #C0C0C0; }
  .result-rank.bronze { color: #CD7F32; }

  .result-name { flex: 1; font-weight: 700; font-size: 15px; }
  .result-pts { font-family: 'Bangers', cursive; font-size: 1.3rem; color: var(--hero-cyan); }

  .next-btn {
    background: var(--hero-gold);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    padding: 12px 40px;
    font-family: 'Bangers', cursive;
    font-size: 1.4rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .next-btn:hover { transform: scale(1.05); }

  /* Scrollbar */
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- WORD SELECTION OVERLAY -->
<div class="word-select-overlay" id="wordSelectOverlay">
  <div class="word-select-title">
    ⚡ Choose Your Word!
    <small>You are the artist this round</small>
  </div>
  <div class="word-choices" id="wordChoices"></div>
</div>

<!-- RESULTS OVERLAY -->
<div class="results-overlay hidden" id="resultsOverlay">
  <div class="results-title">🏆 Round Results!</div>
  <div class="results-list" id="resultsList"></div>
  <button class="next-btn" onclick="startNewRound()">⚡ Next Round!</button>
</div>

<div class="container">
  <header>
    <div class="header-inner">
      <div style="display:flex;flex-direction:column;gap:2px;">
        <div class="logo">Hero<span>Scribble</span> ⚡</div>
        <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(90deg,var(--hero-purple),var(--hero-cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;padding-left:2px;">by Kunal Singh</div>
      </div>
      <div class="header-right">
        <div class="round-badge" id="roundBadge">Round 1 / 6</div>
        <div class="timer-badge" id="timerDisplay">60</div>
      </div>
    </div>
  </header>

  <div class="game-layout">
    <!-- LEFT: PLAYERS -->
    <div class="sidebar-left">
      <div class="panel">
        <div class="panel-header">⚡ Heroes</div>
        <div class="players-list" id="playersList"></div>
      </div>
    </div>

    <!-- CENTER: CANVAS -->
    <div class="canvas-area">
      <div class="word-hint-bar">
        <div>
          <div class="hint-label">Word to draw</div>
          <div class="word-hint" id="wordHint">_ _ _ _ _ _</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <div class="category-badge" id="categoryBadge">🦸 Superheroes</div>
          <div style="font-size:12px;color:var(--muted);" id="lettersCount"></div>
        </div>
      </div>

      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="drawCanvas" width="800" height="480"></canvas>
        <div class="canvas-overlay" id="canvasOverlay">
          ⚡ Waiting for artist…
        </div>
      </div>

      <div class="toolbar" id="toolbar">
        <div class="colors-row" id="colorsRow"></div>
        <div class="sep"></div>
        <div class="size-row" id="sizeRow"></div>
        <div class="sep"></div>
        <button class="tool-btn eraser" id="eraserBtn" onclick="toggleEraser()">🩹 Eraser</button>
        <button class="tool-btn clear" onclick="clearCanvas()">🗑 Clear</button>
        <div style="margin-left:auto;display:flex;gap:6px;">
          <button class="tool-btn" onclick="undoLast()" style="padding:5px 10px;">↩ Undo</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: CHAT + VOICE -->
    <div class="sidebar-right">
      <!-- CHAT -->
      <div class="panel chat-panel" style="flex:1;">
        <div class="panel-header">💬 Chat & Guesses</div>
        <div class="messages" id="messages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" type="text" placeholder="Type your guess…" maxlength="60" />
          <button class="send-btn" onclick="sendGuess()">➤</button>
        </div>
      </div>

      <!-- VOICE CHAT -->
      <div class="panel voice-panel">
        <div class="panel-header">
          🎙 Voice Chat

// ─── CANVAS ─────────────────────────────────────────────────────
const canvas = document.getElementById('drawCanvas');
const ctx = canvas.getContext('2d');
ctx.lineCap = 'round';
ctx.lineJoin = 'round';

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

function startDraw(e) {
  if (!state.drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  state.currentStroke = { color: state.isEraser ? '#FFFFFF' : state.brushColor, size: state.brushSize, points: [pos] };
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
}

function draw(e) {
  if (!state.currentStroke) return;
  e.preventDefault();
  const pos = getPos(e);
  state.currentStroke.points.push(pos);
  ctx.strokeStyle = state.currentStroke.color;
  ctx.lineWidth = state.currentStroke.size * (state.isEraser ? 3 : 1);
  ctx.lineTo(pos.x, pos.y);
  ctx.stroke();
}

function endDraw(e) {
  if (!state.currentStroke) return;
  state.strokes.push(state.currentStroke);
  state.currentStroke = null;
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', draw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', draw, { passive: false });
canvas.addEventListener('touchend', endDraw);

function clearCanvas() {
  if (!state.drawing) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  state.strokes = [];
}

function undoLast() {
  if (!state.drawing || state.strokes.length === 0) return;
  state.strokes.pop();
  redrawAll();
}

function redrawAll() {
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  for (const stroke of state.strokes) {
    ctx.beginPath();
    ctx.strokeStyle = stroke.color;
    ctx.lineWidth = stroke.size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    const pts = stroke.points;
    if (pts.length === 0) continue;
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.stroke();
  }
}

function addMessage(name, text, type = 'normal') {
  const msgs = document.getElementById('messages');
  const player = PLAYERS.find(p => p.name === name);
  const div = document.createElement('div');
  div.className = 'msg ' + type;

  if (type === 'system') {
    div.innerHTML = `<div class="msg-text">${text}</div>`;
  } else {
    const emoji = player ? player.emoji : '❓';
    const color = player ? player.color : '#888';
    div.innerHTML = `
      <div class="msg-avatar" style="background:${color}22;font-size:12px;">${emoji}</div>
      <div class="msg-body">
        <div class="msg-name" style="color:${color}">${name}</div>
        <div class="msg-text">${text}</div>
      </div>
    `;
  }

  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendGuess() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const me = PLAYERS.find(p => p.isMe);
  addMessage(me.name, text, 'normal');

  const drawer = PLAYERS[state.drawerIndex];
  if (me.id !== drawer.id && state.currentWord && !state.correctGuessers.has(me.id)) {
    if (text.toLowerCase() === state.currentWord.toLowerCase()) {
      handleCorrectGuess(me);
    } else if (text.toLowerCase().includes(state.currentWord.toLowerCase().slice(0, 3))) {
      setTimeout(() => addMessage('System', '🔥 So close!', 'system'), 300);
    }
  }
}

document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') sendGuess();
});

function handleCorrectGuess(player) {
  const points = Math.max(100, state.timeLeft * 4);
  player.score += points;
  state.correctGuessers.add(player.id);
  addMessage('System', `🎉 ${player.name} guessed it! +${points} pts`, 'correct-guess');
  showScoreFlash(`+${points}`, player.isMe);
  renderPlayers();
  setTimeout(() => simulateBotGuesses(), 500);
}

function showScoreFlash(text, isMe) {
  if (!isMe) return;
  const el = document.createElement('div');
  el.className = 'score-flash';
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}

  ['Iron Man!', 'is it Thor??', 'Spider-Man?', 'Captain America!', 'Thanos??'],

function simulateBotGuesses() {
  const drawer = PLAYERS[state.drawerIndex];
  const guessers = PLAYERS.filter(p => !p.isMe && p.id !== drawer.id && !state.correctGuessers.has(p.id));
  if (guessers.length === 0) return;
  const p = guessers[Math.floor(Math.random() * guessers.length)];
  const guessPool = BOT_GUESSES[botGuessIdx % BOT_GUESSES.length];
  const guess = guessPool[Math.floor(Math.random() * guessPool.length)];

  setTimeout(() => {
    addMessage(p.name, guess, 'normal');
    if (guess.toLowerCase().includes(state.currentWord ? state.currentWord.slice(0,4).toLowerCase() : 'zzz')) {
      setTimeout(() => {
        p.score += 150;
        state.correctGuessers.add(p.id);
        addMessage('System', `🎉 ${p.name} got it! +150 pts`, 'correct-guess');
        renderPlayers();
      }, 600);

  }, 1500 + Math.random() * 3000);
}

  const drawer = PLAYERS[state.drawerIndex];

  const msgs = [
    'omg is that Thor?? 😂', 'i know this one!!!', 'is it Thanos?', 'Hulk?? Hulk??',

    'bro that drawing is terrible lol', 'nooo that looks nothing like a superhero',
    'Scarlet Witch vibes ngl 🔮', 'Wakanda Forever!!', 'AVENGERS ASSEMBLE 🦾',
  ];

  let delay = 3000;
  chatterBots.slice(0, 2).forEach(bot => {
    setTimeout(() => {
      if (state.timeLeft > 5) {
        const m = msgs[Math.floor(Math.random() * msgs.length)];
        addMessage(bot.name, m, 'normal');
      }
    }, delay);
    delay += 4000 + Math.random() * 5000;
  });
}

    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft === 15) revealLetterHint();
    if (state.timeLeft <= 0) endRound();
  }, 1000);
}

  const el = document.getElementById('timerDisplay');
  el.textContent = state.timeLeft;
  el.classList.toggle('urgent', state.timeLeft <= 10);

// ─── WORD REVEAL ─────────────────────────────────────────────────
function buildHint(word, reveal = 0) {
  return word.split('').map((c, i) => {
    if (c === ' ') return ' ';
    if (i < reveal) return c;
    return '_';
  }).join(' ');
}

function updateWordHintBar(revealCount = 0) {
  const hint = document.getElementById('wordHint');
  const lc = document.getElementById('lettersCount');
  if (state.drawing) {
    hint.textContent = state.currentWord.toUpperCase();
  } else {
    hint.textContent = buildHint(state.currentWord, revealCount).toUpperCase();
  }
  lc.textContent = `${state.currentWord.replace(/ /g,'').length} letters`;
}

let hintReveal = 0;
function revealLetterHint() {
  hintReveal++;
  if (!state.drawing) updateWordHintBar(hintReveal);
}

  state.drawerIndex = (state.drawerIndex + 1) % PLAYERS.length;
  const drawer = PLAYERS[state.drawerIndex];
  state.drawing = drawer.isMe;

  document.getElementById('roundBadge').textContent = `Round ${state.round} / 6`;

  if (state.drawing) {
    showWordSelection();
  } else {
    pickWordForBot();
  }
}

  overlay.classList.remove('hidden');

  const allWords = Object.entries(WORD_SETS).flatMap(([cat, words]) => words.map(w => ({ ...w, cat })));

    const w = allWords[Math.floor(Math.random() * allWords.length)];
    if (!picked.find(p => p.word === w.word)) picked.push(w);
  }

  picked.forEach(item => {
    const isSquad = item.cat === '👥 The Squad';
    const btn = document.createElement('div');
    btn.className = 'word-choice';
    if (isSquad) {
      btn.style.cssText = 'border-color: var(--hero-gold); background: rgba(255,215,0,0.07); position: relative;';
    }
    btn.innerHTML = `
      ${isSquad ? '<div style="position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--hero-gold);color:#0A0A1A;font-size:10px;font-weight:800;padding:2px 10px;border-radius:20px;letter-spacing:1px;white-space:nowrap;">⚡ SQUAD WORD</div>' : ''}
      <div class="word-choice-word" style="${isSquad ? 'color:var(--hero-gold);' : ''}">${item.word.toUpperCase()}</div>
      <div class="word-choice-hint">${item.hint}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-transform:uppercase;letter-spacing:1px;">${item.cat}</div>
    `;
    btn.onclick = () => selectWord(item.word, item.cat);
    choices.appendChild(btn);
  });
}

function selectWord(word, cat) {
  state.currentWord = word;
  state.currentCategory = cat;
  document.getElementById('wordSelectOverlay').classList.add('hidden');
  document.getElementById('canvasOverlay').classList.add('hidden');
  document.getElementById('categoryBadge').textContent = cat === '👥 The Squad' ? '👥 The Squad' : `🦸 ${cat}`;
  updateWordHintBar();

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  state.strokes = [];

  addMessage('System', `✏️ You are drawing: ${word.toUpperCase()}! Go!`, 'system');
  startTimer();
  scheduleBotMessages();
  setTimeout(simulateBotGuesses, 8000 + Math.random() * 8000);
  renderPlayers();
}

function pickWordForBot() {
  const allWords = Object.entries(WORD_SETS).flatMap(([cat, words]) => words.map(w => ({ ...w, cat })));
  const item = allWords[Math.floor(Math.random() * allWords.length)];
  state.currentWord = item.word;
  state.currentCategory = item.cat;

  document.getElementById('canvasOverlay').classList.remove('hidden');
  const drawer = PLAYERS[state.drawerIndex];
  document.getElementById('canvasOverlay').textContent = `✏️ ${drawer.emoji} ${drawer.name} is drawing!`;
  document.getElementById('categoryBadge').textContent = item.cat === '👥 The Squad' ? '👥 The Squad' : `🦸 ${item.cat}`;
  updateWordHintBar(0);

  addMessage('System', `✏️ ${drawer.name} is drawing something!`, 'system');
  startTimer();
  scheduleBotMessages();

  const me = PLAYERS.find(p => p.isMe);
  setTimeout(() => {
    if (state.timeLeft > 0 && !state.correctGuessers.has(me.id)) {
      simulateBotGuesses();
    }
  }, 6000 + Math.random() * 6000);

  renderPlayers();
}

function endRound() {
  clearInterval(state.timerInterval);
  const word = state.currentWord || '?';
  addMessage('System', `⏰ Time\'s up! The word was: ${word.toUpperCase()}`, 'system');
  document.getElementById('canvasOverlay').classList.remove('hidden');
  document.getElementById('canvasOverlay').textContent = `⏰ Time! Word: ${word.toUpperCase()}`;

  if (state.round < state.maxRounds) {
    setTimeout(showResults, 1500);
    state.round++;
  } else {
    setTimeout(showFinalResults, 1500);
  }
}

function showResults() {
  const overlay = document.getElementById('resultsOverlay');
  overlay.classList.remove('hidden');
  const list = document.getElementById('resultsList');
  list.innerHTML = '<div style="font-size:13px;color:var(--muted);margin-bottom:12px;text-align:center;">Round Standings</div>';
  const sorted = [...PLAYERS].sort((a, b) => b.score - a.score);
  const rankEmoji = ['🥇', '🥈', '🥉'];
  sorted.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'result-item';
    if (i < 3) div.style.background = 'rgba(255,215,0,0.04)';
    div.innerHTML = `
      <div class="result-rank ${['gold','silver','bronze'][i]||''}">${rankEmoji[i]||i+1}</div>
      <div class="result-name">${p.emoji} ${p.name}${p.isMe?' (You)':''}</div>
      <div class="result-pts">${p.score} ⚡</div>
    `;
    list.appendChild(div);
  });
}

function showFinalResults() {
  showResults();
  document.querySelector('.next-btn').textContent = '🎮 Play Again!';
  document.querySelector('.next-btn').onclick = () => {
    PLAYERS.forEach(p => p.score = 0);
    state.round = 1;
    state.drawerIndex = -1;
    startNewRound();
  };
}

// ─── INIT ────────────────────────────────────────────────────────
function init() {
  buildToolbar();
  renderPlayers();
  renderVoiceMembers();
  simulateVoice();

  addMessage('System', '⚡ Welcome to HeroScribble! Get ready to draw and guess!', 'system');
  addMessage('System', '🎙 Voice chat is live. Mic is ON.', 'system');
  setTimeout(() => addMessage('WebHead',    'letsgo!!! 🕷 ready to guess!', 'normal'), 1000);
  setTimeout(() => addMessage('ThunderGod', 'THOR IS READY ⚡⚡', 'normal'), 1700);
  setTimeout(() => addMessage('WitchQueen', 'chaos magic activated 🔮✨', 'normal'), 2200);
  setTimeout(() => addMessage('Vibranium',  'Wakanda Forever 🐯', 'normal'), 2700);

  // Start first round after brief delay
  setTimeout(() => {
    state.drawerIndex = -1;
    startNewRound();
  }, 3400);
}

init();
</script>
</body>
